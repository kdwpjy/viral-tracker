name: 바이럴 트래커 — 데이터 수집

on:
  schedule:
    - cron: '0 * * * *'   # 매시 정각 실행 (UTC 기준, KST +9h)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # issues.json 커밋을 위해 필요

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r tracker/requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: 데이터 수집 실행
        run: python -m tracker.scheduler.pipeline --once
        env:
          PYTHONPATH: ${{ github.workspace }}
          PLAYWRIGHT_CHANNEL: chromium

      - name: data/ 커밋 (issues.json + 히스토리 스냅샷)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 데이터 갱신 $(date +'%Y-%m-%d %H:%M') KST"
          git pull --rebase origin main
          git push
